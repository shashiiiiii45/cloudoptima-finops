apiVersion: v1
kind: Namespace
metadata:
  name: cloudoptima

---
# Database Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudoptima-db
  namespace: cloudoptima
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudoptima-db
  template:
    metadata:
      labels:
        app: cloudoptima-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: finops_user
        - name: POSTGRES_PASSWORD
          value: finops_password
        - name: POSTGRES_DB
          value: cloudoptima_finops
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: cloudoptima-db-srv
  namespace: cloudoptima
spec:
  ports:
  - port: 5432
  selector:
    app: cloudoptima-db

---
# Backend Microservice Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudoptima-backend
  namespace: cloudoptima
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudoptima-backend
  template:
    metadata:
      labels:
        app: cloudoptima-backend
    spec:
      containers:
      - name: backend
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/cloudoptima-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgresql://finops_user:finops_password@cloudoptima-db-srv:5432/cloudoptima_finops"
        - name: PORT
          value: "3001"
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: cloudoptima-backend-srv
  namespace: cloudoptima
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: cloudoptima-backend

---
# Frontend Web App Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudoptima-frontend
  namespace: cloudoptima
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudoptima-frontend
  template:
    metadata:
      labels:
        app: cloudoptima-frontend
    spec:
      containers:
      - name: frontend
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/cloudoptima-frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: cloudoptima-frontend-srv
  namespace: cloudoptima
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: cloudoptima-frontend
  type: LoadBalancer

---
# Horizontal Pod Autoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudoptima-backend-hpa
  namespace: cloudoptima
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudoptima-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
